name: Deploy — Tencent Cloud

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend_api_python/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to quant.onemipham.com
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/mipham-quant

            # Pull latest code (first-run: init git repo if not already)
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/One-Mipham/mipham-quant.git
            fi
            git fetch origin main
            git reset --hard origin/main
            git clean -fd  # remove untracked files that conflict

            # Generate secure credentials if not already set
            if ! grep -q "^SECRET_KEY=" backend_api_python/.env 2>/dev/null; then
              NEW_KEY=$(python3 -c 'import secrets; print(secrets.token_hex(32))')
              echo "SECRET_KEY=$NEW_KEY" >> backend_api_python/.env
              echo ">>> Generated new SECRET_KEY"
            fi
            if ! grep -q "^ADMIN_PASSWORD=" backend_api_python/.env 2>/dev/null; then
              NEW_PWD=$(python3 -c 'import secrets; print(secrets.token_urlsafe(16))')
              echo "ADMIN_PASSWORD=$NEW_PWD" >> backend_api_python/.env
              echo ">>> Generated new ADMIN_PASSWORD"
            fi

            # Rebuild and restart
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --wait --wait-timeout 60

            # Health check
            sleep 5
            curl -fsS http://localhost:5010/api/health
            echo ""
            echo ">>> Deploy successful!"

            # Cleanup old images
            docker image prune -af --filter "until=24h"
