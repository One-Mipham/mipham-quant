# Mipham Quant 线上版 — 生产环境 Nginx 配置
# 部署路径: /www/server/panel/vhost/nginx/quant.onemipham.com.conf
# SSL 证书: Let's Encrypt 自动续期 (certbot) 或腾讯云免费证书

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name quant.onemipham.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name quant.onemipham.com;

    # SSL 证书路径（腾讯云面板 Let's Encrypt 自动管理）
    ssl_certificate     /www/server/panel/vhost/cert/quant.onemipham.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/quant.onemipham.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 日志
    access_log /www/wwwlogs/quant.onemipham.com.log;
    error_log  /www/wwwlogs/quant.onemipham.com.error.log;

    # 前端静态文件
    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API 直连后端（绕过前端 nginx）
    location /api/ {
        proxy_pass http://127.0.0.1:5010/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 10m;
    }

    # WebSocket（实时行情推送，如果将来启用）
    location /ws/ {
        proxy_pass http://127.0.0.1:5010/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
